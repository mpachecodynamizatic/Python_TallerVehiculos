{% extends 'base.html' %}
{% block title %}Editar Proveedor{% endblock %}
{% block content %}
<div style="width: 80%; margin: 0 auto;" class="px-4 py-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">Editar Proveedor: {{ object.nombre }}</h1>
    <div class="bg-white rounded-lg shadow p-6">
        <form method="post">
            {% csrf_token %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                {% for field in form %}
                <div {% if field.name == 'notas' %}class="md:col-span-2"{% endif %}>
                    <label class="block text-sm font-medium text-gray-700 mb-2">{{ field.label }} {% if field.field.required %}<span class="text-red-500">*</span>{% endif %}</label>
                    {{ field }}
                    {% if field.errors %}<p class="mt-1 text-sm text-red-600">{{ field.errors.0 }}</p>{% endif %}
                </div>
                {% endfor %}
            </div>
            <div class="mt-6 flex justify-end gap-3">
                <a href="{% url 'compras:detalle_proveedor' object.pk %}" class="px-4 py-2 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400">Cancelar</a>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Actualizar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
